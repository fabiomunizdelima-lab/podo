name: podo

services:
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    image: podo-app
    restart: unless-stopped
    env_file: .env
    volumes:
      - ./:/var/www/html
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    networks: [podo]

  web:
    image: nginx:1.27-alpine
    restart: unless-stopped
    # Espone solo HTTP: il TLS è gestito a monte da Nginx Proxy Manager (NPM).
    # NPM inoltra a  http://IP-DELLA-CT:8080
    ports:
      - "8080:80"
    volumes:
      - ./:/var/www/html:ro
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on: [app]
    networks: [podo]

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_DATABASE:-podo}
      POSTGRES_USER: ${DB_USERNAME:-podo}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-podo}
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-podo}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks: [podo]
    # Non esporre la porta DB all'esterno (checklist: segmentazione rete)

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    networks: [podo]

  scheduler:
    image: podo-app
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    restart: unless-stopped
    env_file: .env
    # Stesso utente dei worker php-fpm per coerenza dei permessi su storage/
    user: "www-data"
    command: php artisan schedule:work
    volumes:
      - ./:/var/www/html
    depends_on: [app, db, redis]
    networks: [podo]

  worker:
    image: podo-app
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    restart: unless-stopped
    env_file: .env
    user: "www-data"
    command: php artisan queue:work --sleep=3 --tries=3 --max-time=3600
    volumes:
      - ./:/var/www/html
    depends_on: [app, db, redis]
    networks: [podo]

volumes:
  db_data:
  redis_data:

networks:
  podo:
    driver: bridge
