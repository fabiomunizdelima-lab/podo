# Nginx per Podo — SOLO HTTP, pensato per stare DIETRO un reverse proxy
# (es. Nginx Proxy Manager) che termina il TLS e inoltra X-Forwarded-*.
#
# NPM -> http://IP-CT:8080  (TLS/Let's Encrypt gestito da NPM)
#
# Per usare invece il TLS direttamente in questo container, vedi
# docker/nginx/direct-tls.conf e ripristina il mount/porta 443 nel compose.

server {
    listen 80;
    server_name _;

    root /var/www/html/public;
    index index.php;

    client_max_body_size 25M;

    # Non servire file nascosti / sensibili
    location ~ /\.(?!well-known) { deny all; }
    location ~* \.(env|log|git)$ { deny all; }

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        fastcgi_pass app:9000;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include fastcgi_params;
        # Propaga lo schema reale visto dal reverse proxy (NPM)
        fastcgi_param HTTPS $http_x_forwarded_proto if_not_empty;
        fastcgi_hide_header X-Powered-By;
    }

    location /build/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
