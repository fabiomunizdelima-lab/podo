# Nginx per Podo — redirect HTTP->HTTPS + TLS + reverse proxy a php-fpm
server {
    listen 80;
    server_name _;
    # Forza HTTPS (checklist: TLS)
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    http2 on;
    server_name _;

    root /var/www/html/public;
    index index.php;

    # Certificati (montati in docker/nginx/certs). In produzione usare Let's Encrypt.
    ssl_certificate     /etc/nginx/certs/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/privkey.pem;

    # TLS 1.2/1.3, cipher moderni (checklist: TLS 1.3)
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    client_max_body_size 25M;

    # Non servire file nascosti / sensibili
    location ~ /\.(?!well-known) { deny all; }
    location ~* \.(env|log|git)$ { deny all; }

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        fastcgi_pass app:9000;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include fastcgi_params;
        fastcgi_hide_header X-Powered-By;
    }

    # Cache asset statici buildati da Vite
    location /build/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
